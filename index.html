<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Ventanilla UDEP</title>
    <style>
        :root { --udep-blue: #003057; --udep-gold: #f1b434; }
        body { background-color: #f4f7f9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .contenedor { width: 100%; max-width: 550px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 6px solid var(--udep-blue); }
        .fila-inputs { display: flex; gap: 15px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--udep-blue); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-transform: uppercase; }
        button { width: 100%; padding: 15px; background: var(--udep-gold); color: var(--udep-blue); border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #d9a12e; }
        .resultado-item { background: #fdfdfd; padding: 15px; border-radius: 8px; border-left: 6px solid #ccc; margin-bottom: 12px; border: 1px solid #eee; }
        .nombre-ev { font-weight: bold; color: var(--udep-blue); display: block; margin-bottom: 4px; }
        .status-badge { font-weight: bold; font-size: 13px; }
        .disponible { color: #27ae60; }
        .fuera { color: #e67e22; }
        .no-disp { color: #c0392b; }
        .error-anuncio { background: #fee; color: #c33; padding: 20px; border-radius: 8px; text-align: center; font-weight: bold; border: 2px dashed #c33; }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="card">
        <div class="fila-inputs">
            <div class="input-group">
                <label>Sigla del Curso</label>
                <input type="text" id="curso" placeholder="Ej: A1MT1">
            </div>
            <div class="input-group">
                <label>Sección</label>
                <input type="text" id="seccion" placeholder="Ej: C">
            </div>
        </div>
        <button onclick="buscarEvaluaciones()">CONSULTAR DISPONIBILIDAD</button>
    </div>

    <div class="card" id="panelResultados">
        <h3 style="margin-top:0; color: var(--udep-blue); font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Estado de Ventanilla</h3>
        <div id="listaResultados">
            <p style="text-align:center; color:#888;">Ingrese los datos del curso.</p>
        </div>
    </div>
</div>

<script>
    async function buscarEvaluaciones() {
        const cursoIn = document.getElementById('curso').value.trim().toUpperCase();
        const seccionIn = document.getElementById('seccion').value.trim().toUpperCase();
        const lista = document.getElementById('listaResultados');

        if (!cursoIn || !seccionIn) {
            alert("Por favor, completa ambos campos.");
            return;
        }

        lista.innerHTML = "<p style='text-align:center;'>Buscando información...</p>";

        try {
            // Intentamos cargar el archivo. 
            // Si el nombre en GitHub es exactamente datos.json, usa este:
            const response = await fetch('datos.json');
            
            if (!response.ok) throw new Error("Archivo no encontrado");

            const data = await response.json();

            const encontrado = data.find(c => 
                c.sigla.toUpperCase() === cursoIn && 
                c.seccion.toUpperCase() === seccionIn
            );

            if (!encontrado) {
                lista.innerHTML = "<div class='error-anuncio'>CURSO O ERROR MAL ESCRITO</div>";
                return;
            }

            renderizar(encontrado);

        } catch (error) {
            lista.innerHTML = `
                <div class='error-anuncio'>
                    ERROR: No se pudo leer el archivo de datos.<br>
                    <small style="font-weight:normal;">Asegúrate de que el archivo se llame 'datos.json' y no 'datos.json.xlsx'</small>
                </div>`;
        }
    }

    function renderizar(datos) {
        const hoy = new Date();
        let html = "";

        // Evaluaciones
        datos.evaluaciones.forEach(ev => {
            const fLimite = new Date(ev.limite);
            fLimite.setHours(23, 59, 59);

            let status = hoy > fLimite ? "FUERA DE VENTANILLA" : "DISPONIBLE";
            let clase = hoy > fLimite ? "fuera" : "disponible";
            let color = hoy > fLimite ? "#e67e22" : "#27ae60";
            let fechaTxt = `${fLimite.getDate()}/${fLimite.getMonth() + 1}`;

            html += `
                <div class="resultado-item" style="border-left-color: ${color}">
                    <span class="nombre-ev">${ev.nombre}</span>
                    <span class="status-badge ${clase}">${status}</span> 
                    ${status === "DISPONIBLE" ? `/ VENCE EL ${fechaTxt} / TURNO ${ev.turno}` : ""}
                </div>
            `;
        });

        // Separador si hay reclamos
        if(datos.reclamos && datos.reclamos.length > 0) {
            html += "<div style='margin: 15px 0; border-top: 1px solid #eee;'></div>";
            
            datos.reclamos.forEach(rec => {
                const esDisp = rec.estado.toUpperCase() === "DISPONIBLE";
                const colorRec = esDisp ? "#27ae60" : "#c0392b";
                
                html += `
                    <div class="resultado-item" style="border-left-color: ${colorRec}">
                        <span class="nombre-ev">${rec.nombre}</span>
                        <span class="status-badge ${esDisp ? 'disponible' : 'no-disp'}">${rec.estado}</span>
                    </div>
                `;
            });
        }

        document.getElementById('listaResultados').innerHTML = html;
    }
</script>

</body>
</html>
