<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Ventanilla UDEP</title>
    <style>
        :root { --udep-blue: #003057; --udep-gold: #f1b434; }
        body { background-color: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .contenedor { width: 100%; max-width: 550px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 6px solid var(--udep-blue); }
        .fila-inputs { display: flex; gap: 15px; }
        .input-group { flex: 1; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--udep-blue); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-transform: uppercase; }
        button { width: 100%; padding: 15px; background: var(--udep-gold); color: var(--udep-blue); border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        button:hover { background: #d9a12e; }
        .resultado-item { background: #fdfdfd; padding: 15px; border-radius: 8px; border-left: 5px solid #ccc; margin-bottom: 12px; border: 1px solid #eee; border-left-width: 6px; }
        .nombre-ev { font-weight: bold; color: var(--udep-blue); display: block; margin-bottom: 4px; }
        .status-badge { font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .disponible { color: #27ae60; }
        .fuera { color: #e67e22; }
        .no-disp { color: #c0392b; }
        .error-anuncio { background: #fee; color: #c33; padding: 20px; border-radius: 8px; text-align: center; font-weight: bold; border: 1px dashed #c33; }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="card">
        <div class="fila-inputs">
            <div class="input-group">
                <label>Sigla del Curso</label>
                <input type="text" id="curso" placeholder="Ej: A1MT1">
            </div>
            <div class="input-group">
                <label>Sección</label>
                <input type="text" id="seccion" placeholder="Ej: C">
            </div>
        </div>
        <button onclick="buscarEvaluaciones()">CONSULTAR DISPONIBILIDAD</button>
    </div>

    <div class="card" id="panelResultados">
        <h3 style="margin-top:0; color: var(--udep-blue); font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Estado de Ventanilla</h3>
        <div id="listaResultados">
            <p style="text-align:center; color:#888;">Ingrese los datos para verificar lo publicado.</p>
        </div>
    </div>
</div>

<script>
    async function buscarEvaluaciones() {
        const cursoIn = document.getElementById('curso').value.trim().toUpperCase();
        const seccionIn = document.getElementById('seccion').value.trim().toUpperCase();
        const lista = document.getElementById('listaResultados');

        if (!cursoIn || !seccionIn) {
            alert("Por favor, ingresa Sigla y Sección");
            return;
        }

        lista.innerHTML = "<p style='text-align:center;'>Buscando en repositorio local...</p>";

        try {
            // Buscamos el archivo datos.json en la misma carpeta de GitHub
            const response = await fetch('datos.json');
            const data = await response.json();

            // Filtramos por curso y sección
            const cursoEncontrado = data.find(c => c.sigla === cursoIn && c.seccion === seccionIn);

            if (!cursoEncontrado) {
                lista.innerHTML = "<div class='error-anuncio'>CURSO O ERROR MAL ESCRITO</div>";
                return;
            }

            mostrarDatos(cursoEncontrado);

        } catch (error) {
            console.error(error);
            lista.innerHTML = "<div class='error-anuncio'>ERROR: NO SE ENCONTRÓ EL ARCHIVO datos.json</div>";
        }
    }

    function mostrarDatos(datos) {
        const hoy = new Date();
        let html = "";

        // 1. Renderizar Evaluaciones Publicadas
        datos.evaluaciones.forEach(ev => {
            const fLimite = new Date(ev.limite);
            // Ajuste de horas para evitar desfases de zona horaria
            fLimite.setHours(23, 59, 59);

            let statusTxt = "";
            let statusClase = "";
            let colorBorde = "";
            let detalles = "";

            if (hoy > fLimite) {
                statusTxt = "FUERA DE VENTANILLA";
                statusClase = "fuera";
                colorBorde = "#e67e22";
            } else {
                statusTxt = "DISPONIBLE";
                statusClase = "disponible";
                colorBorde = "#27ae60";
                const fechaLegible = fLimite.getDate() + "/" + (fLimite.getMonth() + 1);
                detalles = ` / VENCE EL ${fechaLegible} / TURNO ${ev.turno}`;
            }

            html += `
                <div class="resultado-item" style="border-left-color: ${colorBorde}">
                    <span class="nombre-ev">${ev.nombre}</span>
                    <span class="status-badge ${statusClase}">${statusTxt}</span>${detalles}
                </div>
            `;
        });

        // 2. Separador visual
        html += "<div style='margin: 20px 0; border-top: 2px dashed #eee;'></div>";

        // 3. Renderizar Reclamos
        datos.reclamos.forEach(rec => {
            let colorBordeRec = rec.estado === "DISPONIBLE" ? "#27ae60" : "#c0392b";
            let venceRec = "";
            
            if (rec.estado === "DISPONIBLE" && rec.vence) {
                const fVence = new Date(rec.vence);
                venceRec = ` / HASTA EL ${fVence.getDate()}/${fVence.getMonth() + 1}`;
            }

            html += `
                <div class="resultado-item" style="border-left-color: ${colorBordeRec}">
                    <span class="nombre-ev">${rec.nombre}</span>
                    <span class="status-badge ${rec.estado === 'DISPONIBLE' ? 'disponible' : 'no-disp'}">${rec.estado}</span>${venceRec}
                </div>
            `;
        });

        document.getElementById('listaResultados').innerHTML = html;
    }
</script>

</body>
</html>
