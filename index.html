<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rifa FINAE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background: linear-gradient(
        135deg,
        #b7ff4f,
        #7ee000,
        #58b000
    );

    padding:20px;

}

.contenedor{

    width:420px;

    background:white;

    border-radius:30px;

    padding:40px 30px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,0.15);

    border:5px solid #1d4d1d;

}

h1{

    color:#1d4d1d;

    font-size:34px;

    margin-bottom:10px;

}

.subtitulo{

    color:#555;

    font-size:16px;

    margin-bottom:25px;

}

.inputCodigo{

    width:100%;

    padding:18px;

    border-radius:15px;

    border:3px solid #7ed321;

    outline:none;

    font-size:20px;

    text-align:center;

    letter-spacing:3px;

    margin-bottom:20px;

    transition:0.3s;

}

.inputCodigo:focus{

    border-color:#1d4d1d;

    transform:scale(1.02);

}

.boton{

    width:100%;

    padding:18px;

    border:none;

    border-radius:15px;

    background:#1d4d1d;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}

.boton:hover{

    background:#143514;

    transform:translateY(-2px);

}

.resultado{

    margin-top:30px;

    display:none;

    animation:aparecer 0.4s ease;

}

.resultado img{

    width:240px;

    margin-bottom:15px;

}

.mensaje{

    font-size:28px;

    font-weight:bold;

    line-height:1.3;

}

.ganador{

    color:#1f8f1f;

}

.perdedor{

    color:#ff7b00;

}

@keyframes aparecer{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="contenedor">

    <h1>🎟️ Rifa FINAE</h1>

    <div class="subtitulo">
        Ingresa tu código y descubre si ganaste
    </div>

    <!-- INPUT -->
    <input
        type="text"
        id="codigo"
        class="inputCodigo"
        placeholder="000000"
        maxlength="6"
    >

    <!-- BOTÓN -->
    <button
        class="boton"
        onclick="verificarCodigo()"
    >
        Verificar Código
    </button>

    <!-- RESULTADO -->
    <div
        class="resultado"
        id="resultado"
    >

        <!-- IMAGEN -->
        <img
            id="imagenResultado"
            src=""
            alt="Resultado"
        >

        <!-- MENSAJE -->
        <div
            class="mensaje"
            id="mensaje">
        </div>

    </div>

</div>

<script>

/* =========================
   CÓDIGO GANADOR
========================= */

const codigoGanador = "482731";

/* =========================
   VERIFICAR CÓDIGO
========================= */

function verificarCodigo(){

    const codigo = document
    .getElementById("codigo")
    .value
    .trim();

    const resultado = document
    .getElementById("resultado");

    const mensaje = document
    .getElementById("mensaje");

    const imagen = document
    .getElementById("imagenResultado");

    resultado.style.display = "block";

    /* SI GANA */

    if(codigo === codigoGanador){

        mensaje.innerHTML = `
            Felicidades 🎉 <br>
            ganaste un premio de 20 soles
        `;

        mensaje.className = "mensaje ganador";

        // IMAGEN GANADOR
        imagen.src = "ganador.png";

    }

    /* SI PIERDE */

    else{

        mensaje.innerHTML = `
            Sigue intentando 😢 <br>
            estuviste muy cerca
        `;

        mensaje.className = "mensaje perdedor";

        // IMAGEN PERDEDOR
        imagen.src = "perdedor.png";

    }

}

</script>

</body>
</html>
