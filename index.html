<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Ventanilla UDEP</title>
    <style>
        :root { --udep-blue: #003057; --udep-gold: #f1b434; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .contenedor { width: 100%; max-width: 500px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 6px solid var(--udep-blue); }
        .fila-inputs { display: flex; gap: 10px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--udep-blue); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-transform: uppercase; }
        button { width: 100%; padding: 15px; background: var(--udep-gold); color: var(--udep-blue); border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; width: 100%; }
        .resultado-item { background: #fff; padding: 15px; border-radius: 8px; border-left: 6px solid #ccc; margin-bottom: 10px; border: 1px solid #eee; border-left-width: 6px; }
        .nombre-ev { font-weight: bold; color: var(--udep-blue); display: block; }
        .disponible { color: #27ae60; font-weight: bold; }
        .fuera { color: #e67e22; font-weight: bold; }
        .error-anuncio { background: #fee; color: #c33; padding: 20px; border-radius: 8px; text-align: center; font-weight: bold; border: 2px dashed #c33; }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="card">
        <div class="fila-inputs">
            <div style="flex:2">
                <label>Sigla</label>
                <input type="text" id="curso" placeholder="A1MT1">
            </div>
            <div style="flex:1">
                <label>Sección</label>
                <input type="text" id="seccion" placeholder="C">
            </div>
        </div>
        <button onclick="buscar()">CONSULTAR VENTANILLA</button>
    </div>

    <div class="card" id="panel">
        <h3 style="margin-top:0; color: var(--udep-blue);">Resultados</h3>
        <div id="lista">Ingrese datos para buscar.</div>
    </div>
</div>

<script>
    async function buscar() {
        const cIn = document.getElementById('curso').value.trim().toUpperCase();
        const sIn = document.getElementById('seccion').value.trim().toUpperCase();
        const lista = document.getElementById('lista');

        if (!cIn || !sIn) return alert("Ingresa Sigla y Sección");

        lista.innerHTML = "Buscando...";

        try {
            // Buscamos el archivo con el nombre correcto
            const response = await fetch('datos.json');
            if (!response.ok) throw new Error("No se encuentra el archivo datos.json");

            const data = await response.json();

            const encontrado = data.find(item => 
                item.sigla.toUpperCase() === cIn && 
                item.seccion.toUpperCase() === sIn
            );

            if (!encontrado) {
                lista.innerHTML = "<div class='error-anuncio'>CURSO O SECCIÓN NO ENCONTRADOS</div>";
                return;
            }

            render(encontrado);
        } catch (e) {
            lista.innerHTML = `<div class='error-anuncio'>ERROR: Asegúrate de que el archivo se llame 'datos.json' y sea texto válido.</div>`;
        }
    }

    function render(datos) {
        const hoy = new Date();
        let html = "";

        datos.evaluaciones.forEach(ev => {
            const fLim = new Date(ev.limite);
            fLim.setHours(23, 59, 59);
            const isDisp = hoy <= fLim;
            
            html += `
                <div class="resultado-item" style="border-left-color: ${isDisp ? '#27ae60' : '#e67e22'}">
                    <span class="nombre-ev">${ev.nombre}</span>
                    <span class="${isDisp ? 'disponible' : 'fuera'}">${isDisp ? 'DISPONIBLE' : 'FUERA DE VENTANILLA'}</span>
                    ${isDisp ? ` / VENCE: ${fLim.getDate()}/${fLim.getMonth()+1} / TURNO: ${ev.turno}` : ''}
                </div>`;
        });

        if (datos.reclamos) {
            html += "<hr style='border:0; border-top:1px solid #eee; margin:15px 0;'>";
            datos.reclamos.forEach(re => {
                const esOk = re.estado.toUpperCase() === "DISPONIBLE";
                html += `
                    <div class="resultado-item" style="border-left-color: ${esOk ? '#27ae60' : '#c0392b'}">
                        <span class="nombre-ev">${re.nombre}</span>
                        <span style="color:${esOk ? '#27ae60' : '#c0392b'}; font-weight:bold;">${re.estado}</span>
                    </div>`;
            });
        }
        document.getElementById('lista').innerHTML = html;
    }
</script>

</body>
</html>
